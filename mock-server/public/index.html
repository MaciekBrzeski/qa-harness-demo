<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products Demo</title>
<style>
  :root { --bg: #1a1a2e; --card: #16213e; --accent: #0f3460; --text: #e4e4e4; --btn: #533483; --danger: #e94560; --success: #2ecc71; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--accent); padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
  header h1 { font-size: 1.2rem; }
  button[aria-label="navigation-menu"] { background: none; border: 1px solid #555; color: var(--text); padding: .4rem .8rem; border-radius: 4px; cursor: pointer; }
  nav[role="tablist"] { display: flex; background: var(--card); border-bottom: 1px solid #333; }
  nav button[role="tab"] { background: none; border: none; color: #aaa; padding: .8rem 1.5rem; cursor: pointer; font-size: .9rem; border-bottom: 2px solid transparent; }
  nav button[role="tab"][aria-selected="true"] { color: var(--text); border-bottom-color: var(--btn); }
  main { padding: 1.5rem 2rem; max-width: 1200px; margin: 0 auto; }
  .panel { display: none; }
  .panel.active { display: block; }
  .toolbar { display: flex; gap: 1rem; margin-bottom: 1rem; align-items: center; }
  .toolbar input, .toolbar select { background: var(--card); border: 1px solid #444; color: var(--text); padding: .5rem; border-radius: 4px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: .6rem; border-bottom: 2px solid #333; font-size: .85rem; color: #aaa; }
  td { padding: .6rem; border-bottom: 1px solid #222; }
  .btn { background: var(--btn); color: #fff; border: none; padding: .5rem 1rem; border-radius: 4px; cursor: pointer; font-size: .85rem; }
  .btn-danger { background: var(--danger); }
  .btn-sm { padding: .3rem .6rem; font-size: .8rem; }
  .row-actions { position: relative; }
  .row-menu { display: none; position: absolute; right: 0; top: 100%; background: var(--card); border: 1px solid #444; border-radius: 4px; z-index: 10; min-width: 120px; }
  .row-menu.open { display: block; }
  .row-menu button[role="menuitem"] { display: block; width: 100%; text-align: left; background: none; border: none; color: var(--text); padding: .5rem .8rem; cursor: pointer; }
  .row-menu button[role="menuitem"]:hover { background: var(--accent); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); padding: 1.5rem; border-radius: 8px; min-width: 400px; }
  .modal h2 { margin-bottom: 1rem; font-size: 1.1rem; }
  .modal label { display: block; margin: .6rem 0 .2rem; font-size: .85rem; color: #aaa; }
  .modal input, .modal select { width: 100%; background: var(--bg); border: 1px solid #444; color: var(--text); padding: .5rem; border-radius: 4px; }
  .modal-footer { margin-top: 1rem; display: flex; gap: .5rem; justify-content: flex-end; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: .75rem; }
  .badge-active { background: #1a4a2a; color: var(--success); }
  .badge-inactive { background: #4a1a1a; color: var(--danger); }
  .empty { color: #666; padding: 2rem; text-align: center; }
  .loader { display: none; }
</style>
</head>
<body>

<header>
  <button aria-label="navigation-menu">☰</button>
  <h1>Products Demo</h1>
</header>

<nav role="tablist">
  <button role="tab" aria-selected="true" data-panel="products">Products</button>
  <button role="tab" aria-selected="false" data-panel="categories">Categories</button>
</nav>

<main>
  <!-- Products panel -->
  <div class="panel active" id="panel-products">
    <div class="toolbar">
      <button class="btn" aria-label="action-button-add-product" onclick="openAddProduct()">+ Add Product</button>
      <input type="text" placeholder="Search..." aria-label="search-products" oninput="loadProducts()">
      <select aria-label="filter-status" onchange="loadProducts()">
        <option value="">All statuses</option>
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
      </select>
    </div>
    <table>
      <thead><tr><th>ID</th><th>Name</th><th>SKU</th><th>Category</th><th>Status</th><th>Price</th><th></th></tr></thead>
      <tbody id="products-body"></tbody>
    </table>
  </div>

  <!-- Categories panel -->
  <div class="panel" id="panel-categories">
    <div class="toolbar">
      <button class="btn" aria-label="action-button-add-category" onclick="openAddCategory()">+ Add Category</button>
    </div>
    <table>
      <thead><tr><th>ID</th><th>Name</th><th>Parent</th><th></th></tr></thead>
      <tbody id="categories-body"></tbody>
    </table>
  </div>
</main>

<!-- Add/Edit Product Modal -->
<div class="modal-overlay" id="product-modal" role="dialog">
  <div class="modal">
    <h2 id="product-modal-title">Add Product</h2>
    <input type="hidden" id="product-edit-id">
    <label>Name</label>
    <input aria-label="text-field-name" id="pf-name">
    <label>SKU</label>
    <input aria-label="text-field-sku" id="pf-sku">
    <label>Category</label>
    <select aria-label="related-field-category" id="pf-category"></select>
    <label>Price</label>
    <input aria-label="number-field-price" id="pf-price" type="number" step="0.01">
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('product-modal')">Cancel</button>
      <button class="btn" role="button" name="Submit" onclick="submitProduct()">Submit</button>
    </div>
  </div>
</div>

<!-- Add Category Modal -->
<div class="modal-overlay" id="category-modal" role="dialog">
  <div class="modal">
    <h2>Add Category</h2>
    <label>Name</label>
    <input aria-label="text-field-name" id="cf-name">
    <label>Parent</label>
    <select aria-label="related-field-parent" id="cf-parent"><option value="">None</option></select>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('category-modal')">Cancel</button>
      <button class="btn" role="button" name="Submit" onclick="submitCategory()">Submit</button>
    </div>
  </div>
</div>

<!-- Delete Confirm Dialog -->
<div class="modal-overlay" id="delete-dialog" role="dialog">
  <div class="modal">
    <h2>Confirm Delete</h2>
    <p id="delete-msg">Are you sure?</p>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('delete-dialog')">Cancel</button>
      <button class="btn btn-danger" role="button" name="Delete" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="loader mantine-Loader-root" style="display:none"></div>

<script>
const API = '';
let deleteTarget = null;

// Tab switching
document.querySelectorAll('[role="tab"]').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('[role="tab"]').forEach(t => t.setAttribute('aria-selected', 'false'));
    tab.setAttribute('aria-selected', 'true');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
    if (tab.dataset.panel === 'categories') loadCategories();
  });
});

// Products
async function loadProducts() {
  const search = document.querySelector('[aria-label="search-products"]').value;
  const status = document.querySelector('[aria-label="filter-status"]').value;
  let url = `/api/products?`;
  if (search) url += `search=${encodeURIComponent(search)}&`;
  if (status) url += `status=${status}&`;
  const res = await fetch(url);
  const data = await res.json();
  const tbody = document.getElementById('products-body');
  if (!data.results.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">No products found</td></tr>'; return; }
  tbody.innerHTML = data.results.map((p, i) => `
    <tr>
      <td>${p.id}</td>
      <td>${p.name}</td>
      <td>${p.sku}</td>
      <td>${p.category || '—'}</td>
      <td><span class="badge badge-${p.status}">${p.status}</span></td>
      <td>$${p.price.toFixed(2)}</td>
      <td class="row-actions">
        <button class="btn btn-sm" aria-label="row-action-menu-${i}" onclick="toggleRowMenu(this)">⋮</button>
        <div class="row-menu">
          <button role="menuitem" onclick="editProduct(${p.id})">Edit</button>
          <button role="menuitem" onclick="deleteProduct(${p.id}, '${p.name}', '${p.status}')">Delete</button>
        </div>
      </td>
    </tr>`).join('');
}

function toggleRowMenu(btn) {
  document.querySelectorAll('.row-menu.open').forEach(m => m.classList.remove('open'));
  btn.nextElementSibling.classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.row-actions')) document.querySelectorAll('.row-menu.open').forEach(m => m.classList.remove('open'));
});

function openAddProduct() {
  document.getElementById('product-modal-title').textContent = 'Add Product';
  document.getElementById('product-edit-id').value = '';
  document.getElementById('pf-name').value = '';
  document.getElementById('pf-sku').value = '';
  document.getElementById('pf-price').value = '';
  loadCategoryOptions('pf-category');
  document.getElementById('product-modal').classList.add('open');
}

async function editProduct(id) {
  const res = await fetch(`/api/products/${id}`);
  const p = await res.json();
  document.getElementById('product-modal-title').textContent = 'Edit Product';
  document.getElementById('product-edit-id').value = id;
  document.getElementById('pf-name').value = p.name;
  document.getElementById('pf-sku').value = p.sku;
  document.getElementById('pf-price').value = p.price;
  await loadCategoryOptions('pf-category');
  document.getElementById('pf-category').value = p.category || '';
  document.getElementById('product-modal').classList.add('open');
}

async function submitProduct() {
  const editId = document.getElementById('product-edit-id').value;
  const data = {
    name: document.getElementById('pf-name').value,
    sku: document.getElementById('pf-sku').value,
    category: parseInt(document.getElementById('pf-category').value) || null,
    price: parseFloat(document.getElementById('pf-price').value) || 0,
  };
  if (editId) {
    await fetch(`/api/products/${editId}`, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
  } else {
    await fetch('/api/products', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
  }
  closeModal('product-modal');
  loadProducts();
}

function deleteProduct(id, name, status) {
  if (status === 'active') {
    deleteTarget = { type: 'product-deactivate', id, name };
    document.getElementById('delete-msg').textContent = `"${name}" is active. Deactivate and delete?`;
  } else {
    deleteTarget = { type: 'product', id, name };
    document.getElementById('delete-msg').textContent = `Delete "${name}"?`;
  }
  document.getElementById('delete-dialog').classList.add('open');
}

async function confirmDelete() {
  if (!deleteTarget) return;
  if (deleteTarget.type === 'product-deactivate') {
    await fetch(`/api/products/${deleteTarget.id}`, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({status:'inactive'}) });
  }
  if (deleteTarget.type.startsWith('product')) {
    await fetch(`/api/products/${deleteTarget.id}`, { method: 'DELETE' });
    loadProducts();
  } else if (deleteTarget.type === 'category') {
    await fetch(`/api/categories/${deleteTarget.id}`, { method: 'DELETE' });
    loadCategories();
  }
  deleteTarget = null;
  closeModal('delete-dialog');
}

// Categories
async function loadCategories() {
  const res = await fetch('/api/categories');
  const cats = await res.json();
  const tbody = document.getElementById('categories-body');
  tbody.innerHTML = cats.map((c, i) => `
    <tr>
      <td>${c.id}</td>
      <td>${c.name}</td>
      <td>${c.parent || '—'}</td>
      <td class="row-actions">
        <button class="btn btn-sm" aria-label="row-action-menu-${i}" onclick="toggleRowMenu(this)">⋮</button>
        <div class="row-menu">
          <button role="menuitem" onclick="deleteCat(${c.id},'${c.name}')">Delete</button>
        </div>
      </td>
    </tr>`).join('');
}

function deleteCat(id, name) {
  deleteTarget = { type: 'category', id, name };
  document.getElementById('delete-msg').textContent = `Delete category "${name}"?`;
  document.getElementById('delete-dialog').classList.add('open');
}

function openAddCategory() {
  document.getElementById('cf-name').value = '';
  loadCategoryOptions('cf-parent');
  document.getElementById('category-modal').classList.add('open');
}

async function submitCategory() {
  const data = {
    name: document.getElementById('cf-name').value,
    parent: parseInt(document.getElementById('cf-parent').value) || null,
  };
  await fetch('/api/categories', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
  closeModal('category-modal');
  loadCategories();
}

async function loadCategoryOptions(selectId) {
  const res = await fetch('/api/categories');
  const cats = await res.json();
  const sel = document.getElementById(selectId);
  sel.innerHTML = '<option value="">None</option>' + cats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Init
loadProducts();
</script>
</body>
</html>
